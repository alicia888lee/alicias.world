<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta
  name="viewport"
  content="width=device-width, initial-scale=1.0"
/>
<title>Alicia Lee</title>

<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  html,
  body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    font-family: Arial, Helvetica, sans-serif;
    background: #fff;
  }

  .page {
    height: 100vh;
    display: flex;
    flex-direction: column;
  }

  header {
    height: 58px;
    min-height: 58px;
    background: white;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 24px;
    z-index: 10;
  }

  .name,
  .status {
    font-weight: 700;
    color: #000;
    line-height: 1;
    letter-spacing: -0.03em;
  }

  .name {
    font-size: clamp(1.2rem, 2vw, 2.2rem);
  }

  .status {
    font-size: clamp(1rem, 1.8vw, 2rem);
    text-align: right;
  }

  .hero {
    flex: 1;
    position: relative;
    overflow: hidden;
  }

  .hero img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center center;
    display: block;
  }

  /* Mobile */
  @media (max-width: 768px) {
    header {
      padding: 0 16px;
      height: 52px;
      min-height: 52px;
    }

    .name {
      font-size: 1.1rem;
    }

    .status {
      font-size: 1rem;
    }
  }
</style>
</head>

<body>
  <div class="page"> 

    <header>
      <div class="name">ALICIA LEE</div>
      <div class="status">under construction</div>
    </header>

    <section class="hero">
      <img
        src="Alicia_Lee_2.jpg"
        alt="Alicia Lee"
      />
    </section>

  </div>
</body>
</html>
